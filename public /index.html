<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ChatStream - Mobile Chat App</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <!-- ============================================
       AUTH CONTAINER
       ============================================ -->
  <div id="auth-container" class="auth-container">
    <div class="auth-wrapper">
      <!-- Login Form -->
      <div class="auth-card" id="login-form">
        <div class="auth-header">
          <div class="auth-logo">💬</div>
          <h1>ChatStream</h1>
          <p>Connect with everyone</p>
        </div>
        <form onsubmit="handleLoginSubmit(event)">
          <div class="form-group">
            <input 
              type="text" 
              id="login-username" 
              placeholder="Username" 
              required 
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <input 
              type="password" 
              id="login-password" 
              placeholder="Password" 
              required 
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn-primary">Login</button>
        </form>
        <div class="auth-footer">
          <p>Don't have an account? <a href="#" onclick="toggleAuth(event)">Register</a></p>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-card" id="register-form" style="display: none;">
        <div class="auth-header">
          <div class="auth-logo">💬</div>
          <h1>ChatStream</h1>
          <p>Create your account</p>
        </div>
        <form onsubmit="handleRegisterSubmit(event)">
          <div class="form-group">
            <input 
              type="text" 
              id="register-username" 
              placeholder="Username" 
              required 
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <input 
              type="password" 
              id="register-password" 
              placeholder="Password" 
              required 
              autocomplete="new-password"
            />
          </div>
          <button type="submit" class="btn-primary">Register</button>
        </form>
        <div class="auth-footer">
          <p>Already have an account? <a href="#" onclick="toggleAuth(event)">Login</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================
       MAIN APP CONTAINER
       ============================================ -->
  <div id="main-container" class="main-container">
    <!-- ============================================
         CHAT LIST SCREEN
         ============================================ -->
    <div id="chat-list-screen" class="screen chat-list-screen active-screen">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <h1 class="app-title">ChatStream</h1>
        <div class="header-actions">
          <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle Theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input 
            type="text" 
            id="search-input" 
            class="search-input" 
            placeholder="Search or start new chat..." 
            onkeyup="searchUsers()"
          />
        </div>
        <div id="search-results" class="search-results"></div>
      </div>

      <!-- Tabs -->
      <div class="tabs-container">
        <button class="tab-btn active" data-tab="chats" onclick="switchTab('chats', event)">Chats</button>
        <button class="tab-btn" data-tab="status" onclick="switchTab('status', event)">Status</button>
        <button class="tab-btn" data-tab="groups" onclick="switchTab('groups', event)">Groups</button>
      </div>

      <!-- Chats List -->
      <div class="chats-list-container">
        <ul class="chats-list" id="chats-list">
          <!-- Chats will be populated here -->
        </ul>
      </div>

      <!-- Status List -->
      <div id="status-list-container" class="status-list-container" style="display: none;">
        <div class="status-list" id="status-list">
          <!-- Status users will be populated here -->
        </div>
      </div>

      <!-- Groups Section -->
      <div id="groups-section" class="groups-section" style="display: none;">
        <div class="group-create-container">
          <input 
            type="text" 
            id="new-group-name" 
            class="group-input" 
            placeholder="Group name"
          />
          <button class="btn-create-group" onclick="createGroup()">Create</button>
        </div>
        <div id="groups-list" class="groups-list">
          <!-- Groups will be populated here -->
        </div>
      </div>

      <!-- Bottom Actions -->
      <div class="bottom-actions">
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- ============================================
         CHAT SCREEN
         ============================================ -->
    <div id="chat-screen" class="screen chat-screen" style="display: none;">
      <!-- Chat Header -->
      <div class="chat-header">
        <button class="back-btn" onclick="backToChatList()" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="chat-header-info">
          <h2 id="current-room-name">Chat</h2>
          <div class="chat-header-status" id="chat-header-status">Online</div>
        </div>
        <div class="header-spacer"></div>
      </div>

      <!-- Messages Container -->
      <div class="chat-messages" id="chat-messages">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">No messages yet. Start chatting!</div>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator" style="display: none;">
        <div class="message-group received">
          <div class="typing-bubble">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </div>
        </div>
      </div>

      <!-- Message Input Bar (Fixed Bottom) -->
      <div class="message-input-container">
        <button class="input-action-btn emoji-btn" id="emoji-btn" title="Emoji">😊</button>
        <button class="input-action-btn attach-btn" id="attach-btn" title="Attachment">📎</button>
        
        <div class="input-field-wrapper">
          <input 
            type="text" 
            id="message-input" 
            class="message-input" 
            placeholder="Message..." 
            onkeypress="handleKeyPress(event)"
            oninput="handleTyping()"
          />
        </div>

        <button class="input-action-btn mic-btn" id="mic-btn" title="Voice Message">🎤</button>
        <button class="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16346272 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99021575 L3.03521743,10.4311088 C3.03521743,10.5882061 3.34915502,10.7453035 3.50612381,10.7453035 L16.6915026,11.5307905 C16.6915026,11.5307905 17.1624089,11.5307905 17.1624089,12.0020827 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
          </svg>
        </button>
      </div>

      <!-- Recording Indicator (Hidden by default) -->
      <div id="recording-indicator" class="recording-indicator" style="display: none;">
        <div class="recording-dot"></div>
        <span id="recording-time">00:00</span>
      </div>
    </div>

    <!-- ============================================
         STATUS VIEWER SCREEN
         ============================================ -->
    <div id="status-viewer-screen" class="screen status-viewer-screen" style="display: none;">
      <div class="status-viewer-header">
        <button class="back-btn" onclick="closeStatusViewer()" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 id="status-viewer-name">User</h2>
        <div class="header-spacer"></div>
      </div>

      <div class="status-viewer-content">
        <div id="status-viewer-body" class="status-viewer-body">
          <!-- Status content will be populated here -->
        </div>
      </div>

      <div class="status-viewer-progress">
        <div id="status-progress-bar" class="status-progress-bar"></div>
      </div>
    </div>

    <!-- ============================================
         EMOJI PICKER (Modal)
         ============================================ -->
    <div id="emoji-picker-modal" class="emoji-picker-modal" style="display: none;">
      <div class="emoji-picker-header">
        <h3>Select Emoji</h3>
        <button class="close-btn" onclick="closeEmojiPicker()">✕</button>
      </div>
      <div class="emoji-grid" id="emoji-grid">
        <!-- Emojis will be populated here -->
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
